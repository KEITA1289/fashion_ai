<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASHION AI - パーソナルAIスタイリスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FAFAFA; --card: #FFFFFF; --accent: #000000; --text-main: #1A1A1A; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: var(--bg); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        .premium-card { background: var(--card); border-radius: 32px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); overflow: hidden; }
        .bottom-nav { backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.85); border-top: 1px solid rgba(0,0,0,0.05); }
        .btn-gradient { background: linear-gradient(135deg, #1A1A1A 0%, #4A4A4A 100%); transition: all 0.3s ease; }
        .screen { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .chip-input:checked + label { background-color: var(--accent); color: #FFF; border-color: var(--accent); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .img-container { position: relative; width: 100%; padding-top: 125%; background-color: #f3f4f6; }
        .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="max-w-md mx-auto relative min-h-screen pb-24">

    <!-- 1. ホーム画面 -->
    <div id="screen-home" class="screen active">
        <header class="pt-12 px-6 mb-8 text-center">
            <h1 class="text-3xl font-bold tracking-tighter mb-1 italic uppercase">Fashion AI</h1>
            <p class="text-[9px] text-gray-400 font-light tracking-[0.4em] uppercase">AIパーソナルスタイリスト</p>
        </header>

        <section class="px-6 mb-10">
            <div class="premium-card p-8 text-center bg-black text-white">
                <h2 class="text-lg font-bold mb-2">最高の自分に出会おう</h2>
                <p class="text-[10px] opacity-60 mb-8">AIがあなたのクローゼットから最適なコーデを提案します</p>
                <button onclick="navigateTo('purpose')" class="w-full py-5 bg-white text-black rounded-3xl font-bold text-sm tracking-widest shadow-xl">
                    今日のコーデを作る
                </button>
            </div>
        </section>

        <section class="px-6">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xl font-bold italic">Latest Items</h2>
                <button onclick="navigateTo('closet')" class="text-[10px] font-bold text-gray-400 uppercase underline">すべて見る</button>
            </div>
            <div id="home-closet-preview" class="grid grid-cols-2 gap-4">
                <!-- クローゼットプレビュー -->
            </div>
        </section>
    </div>

    <!-- 2. 目的選択画面 -->
    <div id="screen-purpose" class="screen pb-32">
        <header class="pt-12 px-6 mb-8 flex items-center">
            <button onclick="navigateTo('home')" class="mr-4"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 19l-7-7 7-7" /></svg></button>
            <h1 class="text-2xl font-bold">目的を選択</h1>
        </header>
        <div class="px-6 grid grid-cols-2 gap-4" id="purpose-grid">
            <!-- 目的ボタン -->
        </div>
    </div>

    <!-- 3. コーデ提案結果画面 -->
    <div id="screen-results" class="screen pb-32">
        <header class="pt-12 px-6 mb-6 flex justify-between items-center">
            <button onclick="navigateTo('purpose')"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 19l-7-7 7-7" /></svg></button>
            <h2 id="result-title" class="font-bold italic text-xl uppercase">Best Choice</h2>
            <div class="w-6"></div>
        </header>

        <div class="px-6 space-y-6">
            <div id="main-outfit-display" class="premium-card p-6 space-y-6">
                <!-- 生成されたコーデ -->
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="confirmWearToday()" class="btn-gradient w-full py-5 rounded-3xl text-white font-bold text-sm shadow-xl flex items-center justify-center gap-2">
                    👕 今日着た
                </button>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="rateOutfit(2)" class="bg-white border py-4 rounded-2xl text-xl">❤️</button>
                    <button onclick="rateOutfit(0)" class="bg-white border py-4 rounded-2xl text-xl">😐</button>
                    <button onclick="rateOutfit(-2)" class="bg-white border py-4 rounded-2xl text-xl">👎</button>
                </div>
                <button onclick="generateOutfit()" class="w-full py-4 bg-gray-100 rounded-2xl text-[10px] font-bold uppercase tracking-widest text-gray-500">
                    🔄 別のコーデを見る
                </button>
            </div>
        </div>
    </div>

    <!-- 4. クローゼット画面 -->
    <div id="screen-closet" class="screen pb-32">
        <header class="pt-12 px-6 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold italic uppercase tracking-tighter">クローゼット</h1>
            <button onclick="navigateTo('add-item')" class="bg-black text-white px-5 py-3 rounded-full shadow-lg font-bold text-xs">+ 服を追加</button>
        </header>
        <div id="closet-grid" class="px-6 grid grid-cols-2 gap-4">
            <!-- クローゼット一覧 -->
        </div>
    </div>

    <!-- 5. アイテム登録画面 -->
    <div id="screen-add-item" class="screen pb-32">
        <header class="pt-12 px-6 mb-6 flex items-center gap-4">
            <button onclick="navigateTo('closet')"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 19l-7-7 7-7" /></svg></button>
            <h1 class="text-xl font-bold uppercase tracking-tighter">アイテム登録</h1>
        </header>
        <form id="add-item-form" class="px-6 space-y-6">
            <div id="image-preview" class="h-72 bg-gray-100 rounded-[32px] flex items-center justify-center cursor-pointer bg-cover bg-center border-2 border-dashed border-gray-200" onclick="document.getElementById('file-input').click()">写真をアップロード</div>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImageSelect(event)">
            
            <div class="space-y-4">
                <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-2">アイテム名</label>
                <input type="text" id="item-name" class="w-full p-4 border rounded-2xl text-sm font-bold bg-white focus:outline-none">
            </div>

            <div class="space-y-4">
                <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-2">カテゴリー</label>
                <div class="grid grid-cols-3 gap-2">
                    <input type="radio" name="cat" id="cat1" value="トップス" class="hidden chip-input" checked><label for="cat1" class="text-center py-3 border rounded-xl text-[10px]">トップス</label>
                    <input type="radio" name="cat" id="cat2" value="ボトムス" class="hidden chip-input"><label for="cat2" class="text-center py-3 border rounded-xl text-[10px]">ボトムス</label>
                    <input type="radio" name="cat" id="cat3" value="アウター" class="hidden chip-input"><label for="cat3" class="text-center py-3 border rounded-xl text-[10px]">アウター</label>
                    <input type="radio" name="cat" id="cat4" value="シューズ" class="hidden chip-input"><label for="cat4" class="text-center py-3 border rounded-xl text-[10px]">シューズ</label>
                    <input type="radio" name="cat" id="cat5" value="バッグ" class="hidden chip-input"><label for="cat5" class="text-center py-3 border rounded-xl text-[10px]">バッグ</label>
                    <input type="radio" name="cat" id="cat6" value="アクセサリー" class="hidden chip-input"><label for="cat6" class="text-center py-3 border rounded-xl text-[10px]">アクセ</label>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-4">
                    <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-2">カラー</label>
                    <input type="text" id="item-color" placeholder="例: ブラック" class="w-full p-4 border rounded-2xl text-sm font-bold bg-white focus:outline-none">
                </div>
                <div class="space-y-4">
                    <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-2">季節</label>
                    <select id="item-season" class="w-full p-4 border rounded-2xl text-sm font-bold bg-white focus:outline-none appearance-none">
                        <option value="春">春</option>
                        <option value="夏">夏</option>
                        <option value="秋">秋</option>
                        <option value="冬">冬</option>
                    </select>
                </div>
            </div>

            <button type="button" onclick="saveItemToCloset()" class="btn-gradient w-full py-5 rounded-3xl text-white font-bold text-sm tracking-widest shadow-xl uppercase">クローゼットに追加</button>
        </form>
    </div>

    <!-- 6. 着用履歴画面 -->
    <div id="screen-history" class="screen pb-32">
        <header class="pt-12 px-6 mb-6 text-center"><h1 class="text-2xl font-bold italic uppercase tracking-tighter">着用履歴</h1></header>
        <div id="history-container" class="px-6 space-y-4"></div>
    </div>

    <!-- 7. マイページ画面 -->
    <div id="screen-profile" class="screen pb-32">
        <header class="pt-12 px-6 mb-8 text-center text-xl font-bold italic uppercase tracking-tighter">My Profile</header>
        <div class="px-6 space-y-6">
            <div class="premium-card p-8 bg-black text-white text-center">
                <p class="text-[10px] opacity-60 uppercase tracking-widest mb-1">現在の学習レベル</p>
                <h3 id="display-lv" class="text-3xl font-bold italic">LV. 01</h3>
            </div>
            <!-- プロフィール編集、好み分析など (既存ロジック用) -->
            <div class="premium-card p-6">
                <h4 class="text-sm font-bold mb-4 italic">スタイル設定</h4>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="p-height" placeholder="身長" class="w-full p-4 border rounded-2xl text-sm bg-gray-50 focus:outline-none">
                    <input type="number" id="p-weight" placeholder="体重" class="w-full p-4 border rounded-2xl text-sm bg-gray-50 focus:outline-none">
                </div>
            </div>
        </div>
    </div>

    <!-- 5項目ナビゲーション -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 px-4 flex justify-between items-center z-50">
        <button onclick="navigateTo('home')" id="nav-home" class="nav-btn flex flex-col items-center w-1/5 text-black">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">Home</span>
        </button>
        <button onclick="navigateTo('closet')" id="nav-closet" class="nav-btn flex flex-col items-center w-1/5 text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">Closet</span>
        </button>
        <button onclick="navigateTo('favorites')" id="nav-favorites" class="nav-btn flex flex-col items-center w-1/5 text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">Fav</span>
        </button>
        <button onclick="navigateTo('history')" id="nav-history" class="nav-btn flex flex-col items-center w-1/5 text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">History</span>
        </button>
        <button onclick="navigateTo('profile')" id="nav-profile" class="nav-btn flex flex-col items-center w-1/5 text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">Me</span>
        </button>
    </nav>

    <script>
        // --- データ管理 ---
        const appState = {
            closetItems: [], // {id, name, cat, color, season, image}
            history: [],
            itemScores: {}, // {itemId: score}
            learningLv: 1,
            selectedPurpose: "",
            currentOutfit: [],
            currentImageData: null
        };

        const PURPOSES = ["デート", "旅行", "仕事", "カジュアル", "雨の日", "暑い日", "寒い日", "おしゃれして出かけたい", "おまかせ"];

        function loadData() {
            const saved = localStorage.getItem('FASHION_AI_V3');
            if (saved) {
                const parsed = JSON.parse(saved);
                Object.assign(appState, parsed);
            }
            updateUI();
        }

        function saveData() {
            localStorage.setItem('FASHION_AI_V3', JSON.stringify(appState));
        }

        // --- 画面遷移 ---
        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenId}`).classList.add('active');
            
            const mainTabs = ['home', 'closet', 'favorites', 'history', 'profile'];
            if (mainTabs.includes(screenId)) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.replace('text-black', 'text-gray-300');
                });
                const activeNav = document.getElementById(`nav-${screenId}`);
                activeNav.classList.replace('text-gray-300', 'text-black');
            }
            if (screenId === 'closet') renderCloset();
            if (screenId === 'home') renderHome();
            if (screenId === 'history') renderHistory();
            if (screenId === 'purpose') renderPurposeSelection();
            window.scrollTo(0,0);
        }

        // --- クローゼット機能 ---
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            // データ削減のためリサイズ処理等は本番では必要だが、今回はシンプルにbase64化
            const reader = new FileReader();
            reader.onload = (e) => {
                appState.currentImageData = e.target.result;
                const preview = document.getElementById('image-preview');
                preview.style.backgroundImage = `url(${e.target.result})`;
                preview.innerText = "";
            };
            reader.readAsDataURL(file);
        }

        function saveItemToCloset() {
            const name = document.getElementById('item-name').value.trim();
            const cat = document.querySelector('input[name="cat"]:checked').value;
            const color = document.getElementById('item-color').value.trim();
            const season = document.getElementById('item-season').value;
            const image = appState.currentImageData;

            if (!name || !image) return alert("名前と写真を入力してください");

            appState.closetItems.unshift({ id: Date.now(), name, cat, color, season, image });
            appState.currentImageData = null;
            document.getElementById('add-item-form').reset();
            saveData();
            navigateTo('closet');
        }

        function renderCloset() {
            const grid = document.getElementById('closet-grid');
            if (appState.closetItems.length === 0) {
                grid.innerHTML = `<div class="col-span-2 py-20 text-center text-gray-300">クローゼットは空です</div>`;
                return;
            }
            grid.innerHTML = appState.closetItems.map(it => `
                <div class="premium-card">
                    <div class="img-container"><img src="${it.image}"></div>
                    <div class="p-3">
                        <p class="text-[8px] text-gray-400 font-bold uppercase">${it.cat} / ${it.season}</p>
                        <p class="text-[10px] font-bold truncate">${it.name}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- コーデ生成ロジック ---
        function renderPurposeSelection() {
            const grid = document.getElementById('purpose-grid');
            grid.innerHTML = PURPOSES.map(p => `
                <button onclick="selectPurpose('${p}')" class="h-28 premium-card font-bold active:scale-95 transition-all">${p}</button>
            `).join('');
        }

        function selectPurpose(p) {
            appState.selectedPurpose = p;
            generateOutfit();
        }

        function generateOutfit() {
            if (appState.closetItems.length < 2) return alert("まずはアイテムを登録してください");

            // スコアリングとフィルタリング
            const items = [...appState.closetItems].map(it => {
                let s = appState.itemScores[it.id] || 0;
                // 重複回避 (直近3回)
                const recentWears = appState.history.slice(0, 3).some(h => h.items.some(hi => hi.id === it.id));
                if (recentWears) s -= 20;
                
                // 季節・目的による簡易フィルタ
                if (appState.selectedPurpose === "暑い日" && it.season === "夏") s += 10;
                if (appState.selectedPurpose === "寒い日" && it.season === "冬") s += 10;
                
                return { ...it, _s: s + Math.random() * 5 };
            }).sort((a,b) => b._s - a._s);

            // カテゴリ分け
            const tops = items.filter(i => i.cat === "トップス");
            const bottoms = items.filter(i => i.cat === "ボトムス");
            const outers = items.filter(i => i.cat === "アウター");
            const shoes = items.filter(i => i.cat === "シューズ");

            // 組み合わせロジック
            let outfit = [];
            if (tops.length > 0) outfit.push(tops[0]);
            if (bottoms.length > 0) outfit.push(bottoms[0]);
            if (outers.length > 0 && (appState.selectedPurpose === "寒い日" || Math.random() > 0.5)) outfit.push(outers[0]);
            if (shoes.length > 0) outfit.push(shoes[0]);

            appState.currentOutfit = outfit;
            renderResults();
            navigateTo('results');
        }

        function renderResults() {
            document.getElementById('result-title').innerText = appState.selectedPurpose;
            const container = document.getElementById('main-outfit-display');
            container.innerHTML = appState.currentOutfit.map(it => `
                <div class="flex items-center gap-4">
                    <div class="w-20 h-24 rounded-2xl overflow-hidden shadow-sm border"><img src="${it.image}" class="w-full h-full object-cover"></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">${it.cat}</p>
                        <p class="text-sm font-bold tracking-tight">${it.name}</p>
                        <p class="text-[10px] text-gray-400">${it.color} / ${it.season}</p>
                    </div>
                </div>
            `).join('<div class="h-[1px] bg-gray-100"></div>');
        }

        function rateOutfit(points) {
            appState.currentOutfit.forEach(it => {
                appState.itemScores[it.id] = (appState.itemScores[it.id] || 0) + points;
            });
            alert("フィードバックをAIに保存しました");
            saveData();
            updateUI();
        }

        function confirmWearToday() {
            appState.history.unshift({ id: Date.now(), purpose: appState.selectedPurpose, items: appState.currentOutfit });
            appState.learningLv += 0.2;
            saveData();
            alert("着用履歴に保存しました");
            navigateTo('history');
        }

        // --- その他表示 ---
        function renderHistory() {
            const container = document.getElementById('history-container');
            if (appState.history.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-gray-300">履歴はありません</div>`;
                return;
            }
            container.innerHTML = appState.history.map(h => `
                <div class="premium-card p-4 flex items-center gap-4">
                    <div class="flex -space-x-3">
                        ${h.items.slice(0, 3).map(i => `<div class="w-10 h-14 rounded-lg border-2 border-white bg-cover bg-center shadow-sm" style="background-image:url(${i.image})"></div>`).join('')}
                    </div>
                    <div>
                        <p class="text-[10px] font-bold italic uppercase text-gray-400">${h.purpose}</p>
                        <p class="text-[8px] text-gray-300">${new Date(h.id).toLocaleDateString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHome() {
            const container = document.getElementById('home-closet-preview');
            if (appState.closetItems.length === 0) {
                container.innerHTML = `<div class="col-span-2 py-10 text-center text-gray-300 text-xs">アイテムを登録しましょう</div>`;
                return;
            }
            container.innerHTML = appState.closetItems.slice(0, 4).map(it => `
                <div class="premium-card p-2">
                    <div class="img-container rounded-2xl overflow-hidden"><img src="${it.image}"></div>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('display-lv').innerText = `LV. ${Math.floor(appState.learningLv).toString().padStart(2, '0')}`;
        }

        // 初期ロード
        loadData();
    </script>
</body>
</html>
